name: Build and Release APK

on:
  push:
    tags:
      - 'v*' # سيعمل الـ Workflow تلقائياً عند دفع تاغ جديد مثل v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    # حل مشكلة الصلاحيات (Error 403)
    permissions:
      contents: write

    steps:
      # 1. جلب كود المستودع
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. إعداد جافا (مهمة لبناء أندرويد)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. إعداد بيئة أندرويد ومنح صلاحيات التنفيذ لـ Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. بناء نسخة APK صالحة للتثبيت والتجربة (Debug)
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. إنشاء الـ Release ورفع ملف الـ APK السليم إليه
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/debug/app-debug.apk # المسار الافتراضي للملف المستخرج
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
