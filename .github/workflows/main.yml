name: Android Release APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore app/amr3d.keystore \
            -alias amr3d \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass amr3d2026 \
            -keypass amr3d2026 \
            -dname "CN=AmrHamam, OU=3D, O=Amr3D, L=Cairo, ST=Cairo, C=EG"

      - name: Build Signed Release APK
        env:
          KEYSTORE_PATH: amr3d.keystore
          STORE_PASSWORD: amr3d2026
          KEY_ALIAS: amr3d
          KEY_PASSWORD: amr3d2026
        run: ./gradlew assembleRelease

      - name: Get version
        id: ver
        run: |
          V=$(grep versionName app/build.gradle | head -1 | awk -F'"' '{print $2}')
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Amr3DPreview-Pro-v${{ steps.ver.outputs.version }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}-${{ github.run_number }}
          name: "🎮 Amr3DPreview Pro v${{ steps.ver.outputs.version }}"
          body: |
            ## ✅ APK جاهز للتثبيت المباشر
            - بناء رقم: #${{ github.run_number }}
            - موقّع ومجهز للتوزيع
            - Android 7.0+
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
